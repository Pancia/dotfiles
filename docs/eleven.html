<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>Opening ElevenReader...</title>
  <style>
    body { font-family: system-ui; text-align: center; padding: 2em; }
    a { display: inline-block; margin: 1em; padding: 0.8em 1.5em;
        background: #1a1a2e; color: #fff; border-radius: 8px;
        text-decoration: none; font-size: 1.1em; }
    #browser-hint { color: #666; font-size: 0.9em; margin-top: 2em; }
  </style>
</head>
<body>
  <p id="status">Redirecting to ElevenReader...</p>
  <a id="link" style="display:none">Open in ElevenReader</a>
  <p id="browser-hint" style="display:none">
    If the button doesn't work, open this page in your browser:<br>
    <a id="self-link" style="font-size:0.85em; background:#444;">Open in browser</a>
  </p>
  <script>
    var id = location.hash.slice(1);
    if (id) {
      var isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
      var appUrl = "elevenlabs://authorized/player/" + id;
      var webUrl = "https://elevenreader.io/reader/library/" + id;

      if (!isMobile) {
        window.location = webUrl;
      } else {
        var link = document.getElementById("link");
        link.href = appUrl;
        link.style.display = "inline-block";

        // intent:// URI — Android's native way to open apps from webviews
        var intentUrl = "intent://authorized/player/" + id +
          "#Intent;scheme=elevenlabs;package=io.elevenlabs.readerapp;end";
        link.href = intentUrl;

        window.location = intentUrl;
        setTimeout(function() {
          document.getElementById("status").textContent =
            "Tap the button to open in the app:";
          // Show fallback to open in real browser
          var selfLink = document.getElementById("self-link");
          selfLink.href = window.location.href;
          document.getElementById("browser-hint").style.display = "block";
        }, 1500);
      }
    } else {
      document.getElementById("status").textContent = "No item ID provided.";
    }
  </script>
</body>
</html>
